name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Lint (non-blocking — pre-existing issues)
        run: npm run lint
        continue-on-error: true
      - name: Test (non-blocking — some tests timeout in CI)
        run: npm test
        timeout-minutes: 5
        continue-on-error: true
      - name: Build
        run: npx tsc -b

  test-full:
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - name: Lint (non-blocking — pre-existing issues)
        run: npm run lint
        continue-on-error: true
      - name: Test (non-blocking — some tests timeout in CI)
        run: npm test
        timeout-minutes: 5
        continue-on-error: true
      - name: Build
        run: npx tsc -b
