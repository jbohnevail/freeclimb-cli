<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeClimb CLI Designer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent-teal: #004e63;
            --accent-teal-light: #26697a;
            --accent-orange: #fa660a;
            --accent-lime: #c2ff18;
            --accent-red: #f85149;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .preset-bar {
            display: flex;
            gap: 8px;
        }

        .preset-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }

        .preset-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .preset-btn.active {
            background: var(--accent-teal);
            border-color: var(--accent-teal-light);
            color: white;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .controls-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 16px;
        }

        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .terminal {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 20px;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            min-height: 400px;
            border: 1px solid var(--border-color);
        }

        .prompt-output {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 16px 20px;
        }

        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .prompt-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .copy-btn:hover {
            filter: brightness(1.1);
        }

        .copy-btn.copied {
            background: var(--accent-lime);
            color: #000;
        }

        .prompt-text {
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            color: var(--text-primary);
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
        }

        /* Control Styling */
        .control-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .control-group {
            margin-bottom: 14px;
        }

        .control-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .control-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input[type="text"],
        input[type="number"],
        select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            width: 100%;
        }

        input[type="color"] {
            width: 40px;
            height: 32px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-orange);
        }

        .color-preview {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .toggle-group {
            display: flex;
            gap: 4px;
        }

        .toggle-btn {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }

        .toggle-btn:first-child {
            border-radius: 6px 0 0 6px;
        }

        .toggle-btn:last-child {
            border-radius: 0 6px 6px 0;
        }

        .toggle-btn.active {
            background: var(--accent-teal);
            border-color: var(--accent-teal-light);
            color: white;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
        }

        .checkbox-label input {
            accent-color: var(--accent-orange);
            width: 16px;
            height: 16px;
        }

        /* Terminal Content Styling */
        .term-banner {
            white-space: pre;
            margin-bottom: 16px;
        }

        .term-tagline {
            margin-bottom: 20px;
            padding-left: 2px;
        }

        .term-commands {
            margin-bottom: 20px;
        }

        .term-command-line {
            margin-bottom: 4px;
        }

        .term-prompt {
            margin-bottom: 16px;
        }

        .term-table {
            margin-top: 12px;
        }

        .term-row {
            display: flex;
            gap: 0;
        }

        .term-cell {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 16px;
        }

        .term-header-row {
            margin-bottom: 4px;
        }

        .term-separator {
            margin-bottom: 8px;
        }

        .term-link {
            text-decoration: underline;
        }

        .term-dim { opacity: 0.6; }
        .term-bold { font-weight: bold; }

        /* View selector tabs */
        .view-tabs {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 20px;
        }

        .view-tab {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 12px 16px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .view-tab:hover {
            color: var(--text-primary);
        }

        .view-tab.active {
            color: var(--accent-orange);
            border-bottom-color: var(--accent-orange);
        }

        /* Bordered box style */
        .term-box {
            margin: 8px 0;
        }

        .term-box-top {
            display: flex;
        }

        .term-box-middle {
            display: flex;
        }

        .term-box-bottom {
            display: flex;
        }

        /* Status badges */
        .status-active { }
        .status-pending { }
        .status-failed { }

        /* Section within preview */
        .preview-section {
            margin-bottom: 24px;
        }

        .preview-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>FreeClimb CLI Designer</h1>
            <span class="header-subtitle">Interactive playground for CLI visual design</span>
        </div>
        <div class="preset-bar">
            <button class="preset-btn active" onclick="applyPreset('default')">Default</button>
            <button class="preset-btn" onclick="applyPreset('vibrant')">Vibrant</button>
            <button class="preset-btn" onclick="applyPreset('minimal')">Minimal</button>
            <button class="preset-btn" onclick="applyPreset('hacker')">Hacker</button>
            <button class="preset-btn" onclick="applyPreset('corporate')">Corporate</button>
        </div>
    </div>

    <div class="main-container">
        <div class="controls-panel">
            <div class="control-section">
                <div class="section-title">Brand Colors</div>

                <div class="control-group">
                    <label class="control-label">Dark Teal (Headers/Banner)</label>
                    <div class="control-row">
                        <input type="color" id="colorPrimary" value="#004e63" onchange="updateState()">
                        <input type="text" id="colorPrimaryHex" value="#004e63" onchange="syncColorFromHex('Primary')">
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Light Teal (Secondary)</label>
                    <div class="control-row">
                        <input type="color" id="colorSecondary" value="#26697a" onchange="updateState()">
                        <input type="text" id="colorSecondaryHex" value="#26697a" onchange="syncColorFromHex('Secondary')">
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Accent (Commands)</label>
                    <div class="control-row">
                        <input type="color" id="colorAccent" value="#fa660a" onchange="updateState()">
                        <input type="text" id="colorAccentHex" value="#fa660a" onchange="syncColorFromHex('Accent')">
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Success (Status)</label>
                    <div class="control-row">
                        <input type="color" id="colorSuccess" value="#c2ff18" onchange="updateState()">
                        <input type="text" id="colorSuccessHex" value="#c2ff18" onchange="syncColorFromHex('Success')">
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Error</label>
                    <div class="control-row">
                        <input type="color" id="colorError" value="#f85149" onchange="updateState()">
                        <input type="text" id="colorErrorHex" value="#f85149" onchange="syncColorFromHex('Error')">
                    </div>
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">Banner Style</div>

                <div class="control-group">
                    <label class="control-label">Banner Type</label>
                    <select id="bannerType" onchange="updateState()">
                        <option value="block">Block Letters (███)</option>
                        <option value="slant">Slant Style</option>
                        <option value="simple">Simple ASCII</option>
                        <option value="none">No Banner</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Tagline</label>
                    <input type="text" id="tagline" value="The communications CLI for developers and agents" onchange="updateState()">
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showTagline" checked onchange="updateState()">
                        Show tagline
                    </label>
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">Table Formatting</div>

                <div class="control-group">
                    <label class="control-label">Border Style</label>
                    <div class="toggle-group">
                        <button class="toggle-btn" data-value="rounded" onclick="setToggle('borderStyle', this)">Rounded</button>
                        <button class="toggle-btn" data-value="square" onclick="setToggle('borderStyle', this)">Square</button>
                        <button class="toggle-btn" data-value="ascii" onclick="setToggle('borderStyle', this)">ASCII</button>
                        <button class="toggle-btn active" data-value="none" onclick="setToggle('borderStyle', this)">None</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="colorizeStatus" checked onchange="updateState()">
                        Colorize status values
                    </label>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showIcons" checked onchange="updateState()">
                        Show status icons (✓ ✗ ●)
                    </label>
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">Icons & Characters</div>

                <div class="control-group">
                    <label class="control-label">Success Icon</label>
                    <select id="iconSuccess" onchange="updateState()">
                        <option value="✓">✓ Checkmark</option>
                        <option value="✔" selected>✔ Heavy Check</option>
                        <option value="●">● Filled Circle</option>
                        <option value="✅">✅ Emoji</option>
                        <option value="[OK]">[OK] Text</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Error Icon</label>
                    <select id="iconError" onchange="updateState()">
                        <option value="✗">✗ X Mark</option>
                        <option value="✘" selected>✘ Heavy X</option>
                        <option value="○">○ Empty Circle</option>
                        <option value="❌">❌ Emoji</option>
                        <option value="[FAIL]">[FAIL] Text</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Pending Icon</label>
                    <select id="iconPending" onchange="updateState()">
                        <option value="○">○ Empty Circle</option>
                        <option value="◐">◐ Half Circle</option>
                        <option value="⏳" selected>⏳ Hourglass</option>
                        <option value="...">... Dots</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Arrow Style</label>
                    <select id="iconArrow" onchange="updateState()">
                        <option value="→">→ Arrow</option>
                        <option value="›" selected>› Chevron</option>
                        <option value="▶">▶ Triangle</option>
                        <option value="->">>> ASCII</option>
                    </select>
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">Help Display</div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showQuickCommands" checked onchange="updateState()">
                        Show quick commands
                    </label>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showTryHint" checked onchange="updateState()">
                        Show "try:" hint
                    </label>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showDocsLink" checked onchange="updateState()">
                        Show documentation link
                    </label>
                </div>

                <div class="control-group">
                    <label class="control-label">Command Grouping</label>
                    <select id="commandGrouping" onchange="updateState()">
                        <option value="category">By Category</option>
                        <option value="alphabetical">Alphabetical</option>
                        <option value="frequency">By Frequency</option>
                    </select>
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">Output Style</div>

                <div class="control-group">
                    <label class="control-label">Default Output</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-value="formatted" onclick="setToggle('outputStyle', this)">Formatted</button>
                        <button class="toggle-btn" data-value="json" onclick="setToggle('outputStyle', this)">JSON</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="compactOutput" onchange="updateState()">
                        Compact output (less whitespace)
                    </label>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showTimestamps" checked onchange="updateState()">
                        Show timestamps in lists
                    </label>
                </div>
            </div>
        </div>

        <div class="preview-panel">
            <div class="view-tabs">
                <button class="view-tab active" onclick="setView('welcome')">Welcome</button>
                <button class="view-tab" onclick="setView('list')">List Output</button>
                <button class="view-tab" onclick="setView('detail')">Detail View</button>
                <button class="view-tab" onclick="setView('error')">Errors</button>
            </div>

            <div class="preview-area">
                <div class="terminal" id="terminal">
                    <!-- Content rendered by JS -->
                </div>
            </div>

            <div class="prompt-output">
                <div class="prompt-header">
                    <span class="prompt-label">Generated Prompt</span>
                    <button class="copy-btn" onclick="copyPrompt()">Copy</button>
                </div>
                <div class="prompt-text" id="promptText">
                    <!-- Generated prompt -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        const DEFAULTS = {
            colorPrimary: '#004e63',
            colorSecondary: '#26697a',
            colorAccent: '#fa660a',
            colorSuccess: '#c2ff18',
            colorError: '#f85149',
            bannerType: 'block',
            tagline: 'The communications CLI for developers and agents',
            showTagline: true,
            borderStyle: 'none',
            colorizeStatus: true,
            showIcons: true,
            iconSuccess: '✔',
            iconError: '✘',
            iconPending: '⏳',
            iconArrow: '›',
            showQuickCommands: true,
            showTryHint: true,
            showDocsLink: true,
            commandGrouping: 'category',
            outputStyle: 'formatted',
            compactOutput: false,
            showTimestamps: true
        };

        let state = { ...DEFAULTS };
        let currentView = 'welcome';
        let currentPreset = 'default';

        const presets = {
            default: { ...DEFAULTS },
            vibrant: {
                ...DEFAULTS,
                colorPrimary: '#6366f1',
                colorSecondary: '#818cf8',
                colorAccent: '#f59e0b',
                colorSuccess: '#10b981',
                colorError: '#ef4444',
                iconSuccess: '✔',
                iconArrow: '▶'
            },
            minimal: {
                ...DEFAULTS,
                colorPrimary: '#6b7280',
                colorSecondary: '#9ca3af',
                colorAccent: '#374151',
                colorSuccess: '#059669',
                colorError: '#dc2626',
                bannerType: 'simple',
                borderStyle: 'none',
                showIcons: false,
                showTryHint: false,
                compactOutput: true
            },
            hacker: {
                ...DEFAULTS,
                colorPrimary: '#22c55e',
                colorSecondary: '#4ade80',
                colorAccent: '#22c55e',
                colorSuccess: '#22c55e',
                colorError: '#ef4444',
                bannerType: 'slant',
                borderStyle: 'ascii',
                iconSuccess: '[OK]',
                iconError: '[FAIL]',
                iconPending: '...',
                iconArrow: '>>'
            },
            corporate: {
                ...DEFAULTS,
                colorPrimary: '#1e40af',
                colorSecondary: '#3b82f6',
                colorAccent: '#60a5fa',
                colorSuccess: '#16a34a',
                colorError: '#dc2626',
                bannerType: 'simple',
                borderStyle: 'square',
                showIcons: true,
                iconSuccess: '✔',
                iconArrow: '›'
            }
        };

        // Banner designs
        const banners = {
            block: `███████╗██████╗ ███████╗███████╗ ██████╗██╗     ██╗███╗   ███╗██████╗
██╔════╝██╔══██╗██╔════╝██╔════╝██╔════╝██║     ██║████╗ ████║██╔══██╗
█████╗  ██████╔╝█████╗  █████╗  ██║     ██║     ██║██╔████╔██║██████╔╝
██╔══╝  ██╔══██╗██╔══╝  ██╔══╝  ██║     ██║     ██║██║╚██╔╝██║██╔══██╗
██║     ██║  ██║███████╗███████╗╚██████╗███████╗██║██║ ╚═╝ ██║██████╔╝
╚═╝     ╚═╝  ╚═╝╚══════╝╚══════╝ ╚═════╝╚══════╝╚═╝╚═╝     ╚═╝╚═════╝ `,
            slant: `    ______               _________ _           __
   / ____/_______  ___  / ____/ (_)___ ___  / /_
  / /_  / ___/ _ \\/ _ \\/ /   / / / __ \`__ \\/ __ \\
 / __/ / /  /  __/  __/ /___/ / / / / / / / /_/ /
/_/   /_/   \\___/\\___/\\____/_/_/_/ /_/ /_/_.___/ `,
            simple: `
  ___              ___ _ _       _
 | __| _ ___ ___ / __| (_)_ __ | |__
 | _| '_/ -_) -_) (__| | | '  \\| '_ \\
 |_||_| \\___\\___|\___|_|_|_|_|_|_.__/`,
            none: ''
        };

        // Box characters
        const boxChars = {
            rounded: { tl: '╭', tr: '╮', bl: '╰', br: '╯', h: '─', v: '│' },
            square: { tl: '┌', tr: '┐', bl: '└', br: '┘', h: '─', v: '│' },
            ascii: { tl: '+', tr: '+', bl: '+', br: '+', h: '-', v: '|' },
            none: { tl: '', tr: '', bl: '', br: '', h: '', v: '' }
        };

        function updateState() {
            state.colorPrimary = document.getElementById('colorPrimary').value;
            state.colorSecondary = document.getElementById('colorSecondary').value;
            state.colorAccent = document.getElementById('colorAccent').value;
            state.colorSuccess = document.getElementById('colorSuccess').value;
            state.colorError = document.getElementById('colorError').value;
            state.bannerType = document.getElementById('bannerType').value;
            state.tagline = document.getElementById('tagline').value;
            state.showTagline = document.getElementById('showTagline').checked;
            state.colorizeStatus = document.getElementById('colorizeStatus').checked;
            state.showIcons = document.getElementById('showIcons').checked;
            state.iconSuccess = document.getElementById('iconSuccess').value;
            state.iconError = document.getElementById('iconError').value;
            state.iconPending = document.getElementById('iconPending').value;
            state.iconArrow = document.getElementById('iconArrow').value;
            state.showQuickCommands = document.getElementById('showQuickCommands').checked;
            state.showTryHint = document.getElementById('showTryHint').checked;
            state.showDocsLink = document.getElementById('showDocsLink').checked;
            state.commandGrouping = document.getElementById('commandGrouping').value;
            state.compactOutput = document.getElementById('compactOutput').checked;
            state.showTimestamps = document.getElementById('showTimestamps').checked;

            // Sync hex inputs
            document.getElementById('colorPrimaryHex').value = state.colorPrimary;
            document.getElementById('colorSecondaryHex').value = state.colorSecondary;
            document.getElementById('colorAccentHex').value = state.colorAccent;
            document.getElementById('colorSuccessHex').value = state.colorSuccess;
            document.getElementById('colorErrorHex').value = state.colorError;

            renderPreview();
            updatePrompt();
        }

        function syncColorFromHex(name) {
            const hex = document.getElementById(`color${name}Hex`).value;
            if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                document.getElementById(`color${name}`).value = hex;
                updateState();
            }
        }

        function setToggle(group, btn) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state[group] = btn.dataset.value;
            renderPreview();
            updatePrompt();
        }

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.view-tab[onclick="setView('${view}')"]`).classList.add('active');
            renderPreview();
        }

        function applyPreset(name) {
            currentPreset = name;
            state = { ...presets[name] };

            // Update all controls
            document.getElementById('colorPrimary').value = state.colorPrimary;
            document.getElementById('colorPrimaryHex').value = state.colorPrimary;
            document.getElementById('colorSecondary').value = state.colorSecondary;
            document.getElementById('colorSecondaryHex').value = state.colorSecondary;
            document.getElementById('colorAccent').value = state.colorAccent;
            document.getElementById('colorAccentHex').value = state.colorAccent;
            document.getElementById('colorSuccess').value = state.colorSuccess;
            document.getElementById('colorSuccessHex').value = state.colorSuccess;
            document.getElementById('colorError').value = state.colorError;
            document.getElementById('colorErrorHex').value = state.colorError;
            document.getElementById('bannerType').value = state.bannerType;
            document.getElementById('tagline').value = state.tagline;
            document.getElementById('showTagline').checked = state.showTagline;
            document.getElementById('colorizeStatus').checked = state.colorizeStatus;
            document.getElementById('showIcons').checked = state.showIcons;
            document.getElementById('iconSuccess').value = state.iconSuccess;
            document.getElementById('iconError').value = state.iconError;
            document.getElementById('iconPending').value = state.iconPending;
            document.getElementById('iconArrow').value = state.iconArrow;
            document.getElementById('showQuickCommands').checked = state.showQuickCommands;
            document.getElementById('showTryHint').checked = state.showTryHint;
            document.getElementById('showDocsLink').checked = state.showDocsLink;
            document.getElementById('commandGrouping').value = state.commandGrouping;
            document.getElementById('compactOutput').checked = state.compactOutput;
            document.getElementById('showTimestamps').checked = state.showTimestamps;

            // Update toggle buttons
            document.querySelectorAll('[data-value]').forEach(btn => {
                const group = btn.closest('.control-group').querySelector('.control-label')?.textContent;
                if (group === 'Border Style') {
                    btn.classList.toggle('active', btn.dataset.value === state.borderStyle);
                } else if (group === 'Default Output') {
                    btn.classList.toggle('active', btn.dataset.value === state.outputStyle);
                }
            });

            // Update preset buttons
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.preset-btn[onclick="applyPreset('${name}')"]`).classList.add('active');

            renderPreview();
            updatePrompt();
        }

        function span(text, color) {
            return `<span style="color: ${color}">${escapeHtml(text)}</span>`;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderPreview() {
            const terminal = document.getElementById('terminal');
            let html = '';

            switch (currentView) {
                case 'welcome':
                    html = renderWelcome();
                    break;
                case 'list':
                    html = renderList();
                    break;
                case 'detail':
                    html = renderDetail();
                    break;
                case 'error':
                    html = renderError();
                    break;
            }

            terminal.innerHTML = html;
        }

        function renderWelcome() {
            let html = '';
            const sp = state.compactOutput ? '' : '\n';

            // Banner
            if (state.bannerType !== 'none') {
                html += `<div class="term-banner" style="color: ${state.colorPrimary}">${escapeHtml(banners[state.bannerType])}</div>`;
            }

            // Tagline
            if (state.showTagline) {
                html += `<div class="term-tagline" style="color: ${state.colorPrimary}">${sp}  ${escapeHtml(state.tagline)}</div>`;
            }

            html += sp;

            // Quick commands
            if (state.showQuickCommands) {
                const commands = [
                    { cmd: 'calls make | list | get', desc: 'Make and manage calls' },
                    { cmd: 'sms send | list | get', desc: 'Send and manage SMS' },
                    { cmd: 'applications list | create', desc: 'Manage applications' },
                    { cmd: 'incoming-numbers buy | list', desc: 'Manage phone numbers' },
                    { cmd: 'logs list | filter', desc: 'View account logs' },
                    { cmd: 'mcp start | config', desc: 'AI agent integration' },
                    { cmd: 'api <endpoint>', desc: 'Authenticated API request' }
                ];

                html += '<div class="term-commands">';
                for (const c of commands) {
                    html += `<div class="term-command-line">  ${span('$', state.colorSecondary)} ${span('freeclimb ' + c.cmd, state.colorSecondary)}  <span style="color: ${state.colorSecondary}">${escapeHtml(c.desc)}</span></div>`;
                }
                html += '</div>';
            }

            // Try hint
            if (state.showTryHint) {
                html += `<div class="term-prompt">${sp}  ${span('try:', state.colorSuccess)} ${span('freeclimb calls:list --json', state.colorSuccess)}</div>`;
            }

            // Docs link
            if (state.showDocsLink) {
                html += `<div class="term-dim">${sp}  ${span('Learn more', state.colorAccent)} at <span style="text-decoration: underline">https://docs.freeclimb.com/docs/freeclimb-cli-quickstart</span></div>`;
            }

            return html;
        }

        function renderList() {
            const box = boxChars[state.borderStyle];
            const hasBox = state.borderStyle !== 'none';
            let html = '';

            // Sample data
            const calls = [
                { id: 'CA1234567890', from: '+15551234567', to: '+15559876543', status: 'completed', created: '2026-01-29 10:23' },
                { id: 'CA2345678901', from: '+15551234567', to: '+15558765432', status: 'in-progress', created: '2026-01-29 10:25' },
                { id: 'CA3456789012', from: '+15551234567', to: '+15557654321', status: 'failed', created: '2026-01-29 10:27' },
                { id: 'CA4567890123', from: '+15551234567', to: '+15556543210', status: 'queued', created: '2026-01-29 10:28' }
            ];

            const statusIcon = (status) => {
                if (!state.showIcons) return '';
                switch (status) {
                    case 'completed': return state.iconSuccess + ' ';
                    case 'in-progress':
                    case 'queued': return state.iconPending + ' ';
                    case 'failed': return state.iconError + ' ';
                    default: return '';
                }
            };

            const statusColor = (status) => {
                if (!state.colorizeStatus) return 'inherit';
                switch (status) {
                    case 'completed': return state.colorSuccess;
                    case 'in-progress':
                    case 'queued': return state.colorAccent;
                    case 'failed': return state.colorError;
                    default: return 'inherit';
                }
            };

            // Title
            if (hasBox) {
                const title = ' Calls ';
                const lineLen = 70;
                const leftPad = Math.floor((lineLen - title.length) / 2);
                const rightPad = lineLen - title.length - leftPad;
                html += `<div style="color: ${state.colorPrimary}">${box.tl}${box.h.repeat(leftPad)}${span(title, state.colorAccent)}${box.h.repeat(rightPad)}${box.tr}</div>`;
            } else {
                html += `<div style="color: ${state.colorAccent}; font-weight: bold">Calls</div><div style="color: ${state.colorPrimary}">${'─'.repeat(50)}</div>`;
            }

            // Headers
            const headers = state.showTimestamps
                ? ['ID', 'FROM', 'TO', 'STATUS', 'CREATED']
                : ['ID', 'FROM', 'TO', 'STATUS'];
            const widths = state.showTimestamps ? [16, 14, 14, 14, 18] : [16, 14, 14, 14];

            html += '<div class="term-table">';

            // Header row
            let headerRow = hasBox ? `<span style="color: ${state.colorPrimary}">${box.v}</span> ` : '';
            headers.forEach((h, i) => {
                headerRow += `<span style="color: ${state.colorPrimary}; font-weight: bold">${h.padEnd(widths[i])}</span>`;
            });
            if (hasBox) headerRow += ` <span style="color: ${state.colorPrimary}">${box.v}</span>`;
            html += `<div class="term-header-row">${headerRow}</div>`;

            // Separator
            if (hasBox) {
                html += `<div class="term-separator" style="color: ${state.colorPrimary}">├${'─'.repeat(widths.reduce((a, b) => a + b, 0) + widths.length)}┤</div>`;
            }

            // Data rows
            for (const call of calls) {
                let row = hasBox ? `<span style="color: ${state.colorPrimary}">${box.v}</span> ` : '';
                row += `<span class="term-dim">${call.id.padEnd(widths[0])}</span>`;
                row += `${call.from.padEnd(widths[1])}`;
                row += `${call.to.padEnd(widths[2])}`;
                row += `<span style="color: ${statusColor(call.status)}">${(statusIcon(call.status) + call.status).padEnd(widths[3])}</span>`;
                if (state.showTimestamps) {
                    row += `<span class="term-dim">${call.created.padEnd(widths[4])}</span>`;
                }
                if (hasBox) row += ` <span style="color: ${state.colorPrimary}">${box.v}</span>`;
                html += `<div>${row}</div>`;
            }

            // Bottom border
            if (hasBox) {
                html += `<div style="color: ${state.colorPrimary}">${box.bl}${'─'.repeat(widths.reduce((a, b) => a + b, 0) + widths.length)}${box.br}</div>`;
            }

            html += '</div>';

            // Pagination hint
            html += `<div style="margin-top: 12px;"><span style="color: ${state.colorSecondary}">Showing 4 of 127</span>  ${span('--next CA4567890123', state.colorAccent)} <span style="color: ${state.colorSecondary}">for more</span></div>`;

            return html;
        }

        function renderDetail() {
            const box = boxChars[state.borderStyle];
            const hasBox = state.borderStyle !== 'none';
            let html = '';

            const call = {
                callId: 'CA1234567890abcdef1234567890abcd',
                accountId: 'AC0987654321fedcba0987654321fedc',
                from: '+15551234567',
                to: '+15559876543',
                status: 'completed',
                direction: 'outboundAPI',
                duration: 127,
                startTime: '2026-01-29T10:23:45.123Z',
                endTime: '2026-01-29T10:25:52.456Z',
                applicationId: 'AP1122334455667788990011223344'
            };

            const statusColor = state.colorizeStatus ? state.colorSuccess : 'inherit';
            const icon = state.showIcons ? state.iconSuccess + ' ' : '';

            // Title
            if (hasBox) {
                const title = ' Call Details ';
                const lineLen = 60;
                html += `<div style="color: ${state.colorPrimary}">${box.tl}${box.h.repeat(Math.floor((lineLen - title.length) / 2))}${span(title, state.colorAccent)}${box.h.repeat(Math.ceil((lineLen - title.length) / 2))}${box.tr}</div>`;
            } else {
                html += `<div style="color: ${state.colorAccent}; font-weight: bold">Call Details</div><div style="color: ${state.colorPrimary}">${'─'.repeat(40)}</div>`;
            }

            // Key-value pairs
            const pairs = [
                ['Call ID', call.callId],
                ['Status', { value: icon + call.status, color: statusColor }],
                ['From', call.from],
                ['To', call.to],
                ['Direction', call.direction],
                ['Duration', `${call.duration}s`],
                ['Started', call.startTime],
                ['Ended', call.endTime],
                ['Application', call.applicationId]
            ];

            html += '<div style="margin: 8px 0">';
            for (const [key, val] of pairs) {
                const prefix = hasBox ? `<span style="color: ${state.colorPrimary}">${box.v}</span> ` : '';
                const suffix = hasBox ? ` <span style="color: ${state.colorPrimary}">${box.v}</span>` : '';
                const value = typeof val === 'object'
                    ? `<span style="color: ${val.color}">${escapeHtml(val.value)}</span>`
                    : escapeHtml(val);
                html += `<div>${prefix}${span(key.padEnd(14), state.colorSecondary)} ${value}${suffix}</div>`;
            }
            html += '</div>';

            // Bottom border
            if (hasBox) {
                html += `<div style="color: ${state.colorPrimary}">${box.bl}${'─'.repeat(60)}${box.br}</div>`;
            }

            // Quick actions
            html += `<div style="margin-top: 16px">`;
            html += `<div style="color: ${state.colorSecondary}; font-weight: bold">Quick Actions</div>`;
            html += `<div>  ${span(state.iconArrow, state.colorAccent)} ${span('freeclimb calls:update CA1234... --status canceled', state.colorAccent)}</div>`;
            html += `<div>  ${span(state.iconArrow, state.colorAccent)} ${span('freeclimb recordings:list --call-id CA1234...', state.colorAccent)}</div>`;
            html += '</div>';

            return html;
        }

        function renderError() {
            let html = '';
            const icon = state.showIcons ? state.iconError + ' ' : '';

            html += `<div style="color: ${state.colorError}; font-weight: bold">${icon}Error: Invalid phone number format</div>`;
            html += '<div style="margin: 12px 0">';
            html += `<div><span style="color: ${state.colorSecondary}">Code:</span> INVALID_PHONE_NUMBER</div>`;
            html += `<div><span style="color: ${state.colorSecondary}">Input:</span> <span class="term-dim">123-456-7890</span></div>`;
            html += '</div>';

            html += `<div style="margin-top: 16px">`;
            html += `<div style="color: ${state.colorSecondary}; font-weight: bold">Suggestion</div>`;
            html += `<div class="term-dim">Phone numbers must be in E.164 format (e.g., +15551234567)</div>`;
            html += '</div>';

            html += `<div style="margin-top: 16px">`;
            html += `<div style="color: ${state.colorSecondary}; font-weight: bold">Try</div>`;
            html += `<div>  ${span('1.', state.colorSecondary)} ${span('freeclimb sms:send +15551234567 +15559876543 "Hello"', state.colorAccent)}</div>`;
            html += `<div>  ${span('2.', state.colorSecondary)} ${span('freeclimb incoming-numbers:list', state.colorAccent)} <span class="term-dim">to see your numbers</span></div>`;
            html += '</div>';

            if (state.showDocsLink) {
                html += `<div style="margin-top: 16px" class="term-dim">Need help? <span style="text-decoration: underline">https://docs.freeclimb.com/reference/phone-number-format</span></div>`;
            }

            return html;
        }

        function updatePrompt() {
            const changes = [];

            // Colors
            if (state.colorPrimary !== DEFAULTS.colorPrimary) {
                changes.push(`dark teal (primary): ${state.colorPrimary}`);
            }
            if (state.colorSecondary !== DEFAULTS.colorSecondary) {
                changes.push(`light teal (secondary): ${state.colorSecondary}`);
            }
            if (state.colorAccent !== DEFAULTS.colorAccent) {
                changes.push(`accent color: ${state.colorAccent} (for commands and highlights)`);
            }
            if (state.colorSuccess !== DEFAULTS.colorSuccess) {
                changes.push(`success color: ${state.colorSuccess}`);
            }
            if (state.colorError !== DEFAULTS.colorError) {
                changes.push(`error color: ${state.colorError}`);
            }

            // Banner
            if (state.bannerType !== DEFAULTS.bannerType) {
                const bannerNames = { block: 'block letters', slant: 'slant style', simple: 'simple ASCII', none: 'no banner' };
                changes.push(`banner style: ${bannerNames[state.bannerType]}`);
            }
            if (state.tagline !== DEFAULTS.tagline) {
                changes.push(`tagline: "${state.tagline}"`);
            }
            if (!state.showTagline && DEFAULTS.showTagline) {
                changes.push(`hide the tagline`);
            }

            // Table formatting
            if (state.borderStyle !== DEFAULTS.borderStyle) {
                const borderNames = { rounded: 'rounded corners', square: 'square corners', ascii: 'ASCII characters', none: 'no borders' };
                changes.push(`table borders: ${borderNames[state.borderStyle]}`);
            }
            if (!state.colorizeStatus && DEFAULTS.colorizeStatus) {
                changes.push(`disable status colorization`);
            }
            if (!state.showIcons && DEFAULTS.showIcons) {
                changes.push(`hide status icons`);
            }

            // Icons
            if (state.iconSuccess !== DEFAULTS.iconSuccess) {
                changes.push(`success icon: ${state.iconSuccess}`);
            }
            if (state.iconError !== DEFAULTS.iconError) {
                changes.push(`error icon: ${state.iconError}`);
            }
            if (state.iconPending !== DEFAULTS.iconPending) {
                changes.push(`pending icon: ${state.iconPending}`);
            }
            if (state.iconArrow !== DEFAULTS.iconArrow) {
                changes.push(`arrow/chevron: ${state.iconArrow}`);
            }

            // Help display
            if (!state.showQuickCommands && DEFAULTS.showQuickCommands) {
                changes.push(`hide quick commands from welcome screen`);
            }
            if (!state.showTryHint && DEFAULTS.showTryHint) {
                changes.push(`hide the "try:" hint`);
            }
            if (!state.showDocsLink && DEFAULTS.showDocsLink) {
                changes.push(`hide documentation links`);
            }
            if (state.commandGrouping !== DEFAULTS.commandGrouping) {
                changes.push(`group commands ${state.commandGrouping === 'alphabetical' ? 'alphabetically' : 'by usage frequency'}`);
            }

            // Output
            if (state.outputStyle !== DEFAULTS.outputStyle) {
                changes.push(`default to JSON output`);
            }
            if (state.compactOutput && !DEFAULTS.compactOutput) {
                changes.push(`use compact output with less whitespace`);
            }
            if (!state.showTimestamps && DEFAULTS.showTimestamps) {
                changes.push(`hide timestamps in list views`);
            }

            const promptEl = document.getElementById('promptText');

            if (changes.length === 0) {
                promptEl.textContent = 'Using default FreeClimb CLI styling. Make changes above to generate a customization prompt.';
                return;
            }

            let prompt = `Update the FreeClimb CLI theme (src/ui/theme.ts) with these customizations:\n\n`;
            prompt += changes.map(c => `• ${c}`).join('\n');
            prompt += `\n\nApply these changes consistently across:\n`;
            prompt += `• src/ui/theme.ts - Color definitions and typography helpers\n`;
            prompt += `• src/ui/banner.ts - Welcome banner and tagline\n`;
            prompt += `• src/ui/chars.ts - Icons and box drawing characters\n`;
            prompt += `• src/ui/components.ts - Reusable UI components\n`;
            prompt += `• src/ui/format.ts - Table formatters and output wrappers`;

            promptEl.textContent = prompt;
        }

        function copyPrompt() {
            const text = document.getElementById('promptText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Initialize
        renderPreview();
        updatePrompt();
    </script>
</body>
</html>
