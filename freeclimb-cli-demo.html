<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeClimb CLI Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent-teal: #004e63;
            --accent-teal-light: #26697a;
            --accent-orange: #fa660a;
            --accent-lime: #c2ff18;
            --accent-red: #f85149;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .preset-bar {
            display: flex;
            gap: 8px;
        }

        .preset-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }

        .preset-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .preset-btn.active {
            background: var(--accent-teal);
            border-color: var(--accent-teal-light);
            color: white;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .controls-panel {
            width: 340px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 16px;
        }

        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .terminal {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 20px;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            min-height: 400px;
            border: 1px solid var(--border-color);
        }

        .terminal-header {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-dot.red { background: #ff5f56; }
        .terminal-dot.yellow { background: #ffbd2e; }
        .terminal-dot.green { background: #27c93f; }

        .prompt-output {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 16px 20px;
        }

        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .prompt-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .copy-btn:hover {
            filter: brightness(1.1);
        }

        .copy-btn.copied {
            background: var(--accent-lime);
            color: #000;
        }

        .prompt-text {
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            color: var(--text-primary);
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
        }

        /* Control Styling */
        .control-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .control-group {
            margin-bottom: 14px;
        }

        .control-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            width: 100%;
            cursor: pointer;
        }

        .toggle-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            flex: 1;
            min-width: 70px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
            border-radius: 6px;
        }

        .toggle-btn:hover {
            background: var(--border-color);
        }

        .toggle-btn.active {
            background: var(--accent-teal);
            border-color: var(--accent-teal-light);
            color: white;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
        }

        .checkbox-label input {
            accent-color: var(--accent-orange);
            width: 16px;
            height: 16px;
        }

        /* Terminal Content */
        .term-banner {
            white-space: pre;
            margin-bottom: 16px;
            color: var(--accent-teal);
        }

        .term-tagline {
            margin-bottom: 20px;
            padding-left: 2px;
            color: var(--accent-teal);
        }

        .term-dim { opacity: 0.6; }
        .term-bold { font-weight: bold; }

        /* Command input styling */
        .command-input-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .command-prompt {
            color: var(--accent-lime);
            margin-right: 8px;
        }

        .command-text {
            color: var(--text-primary);
        }

        /* Animation */
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--text-primary);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        /* Quick action cards */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 16px;
        }

        .quick-action {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .quick-action:hover {
            border-color: var(--accent-orange);
            background: var(--bg-secondary);
        }

        .quick-action-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-orange);
            margin-bottom: 4px;
        }

        .quick-action-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* View tabs */
        .view-tabs {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 20px;
        }

        .view-tab {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 12px 16px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .view-tab:hover {
            color: var(--text-primary);
        }

        .view-tab.active {
            color: var(--accent-orange);
            border-bottom-color: var(--accent-orange);
        }

        /* Status styling */
        .status-completed { color: var(--accent-lime); }
        .status-active { color: var(--accent-lime); }
        .status-in-progress { color: var(--accent-orange); }
        .status-queued { color: var(--accent-orange); }
        .status-pending { color: var(--accent-orange); }
        .status-failed { color: var(--accent-red); }
        .status-error { color: var(--accent-red); }

        /* Table styling */
        .term-table {
            margin: 8px 0;
        }

        .term-table-header {
            color: var(--accent-teal);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .term-table-separator {
            color: var(--accent-teal);
            margin-bottom: 8px;
        }

        .term-table-row {
            margin-bottom: 2px;
        }

        /* Box styling */
        .term-box {
            border: 1px solid var(--accent-teal);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 8px 0;
        }

        .term-box-title {
            color: var(--accent-orange);
            font-weight: bold;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-color);
        }

        /* Info callout */
        .info-callout {
            background: rgba(250, 102, 10, 0.1);
            border-left: 3px solid var(--accent-orange);
            padding: 8px 12px;
            margin: 12px 0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>FreeClimb CLI Demo</h1>
            <span class="header-subtitle">Interactive mock demo of the CLI experience</span>
        </div>
        <div class="preset-bar">
            <button class="preset-btn active" onclick="applyPreset('default')">Default</button>
            <button class="preset-btn" onclick="applyPreset('developer')">Developer</button>
            <button class="preset-btn" onclick="applyPreset('agent')">AI Agent</button>
            <button class="preset-btn" onclick="applyPreset('enterprise')">Enterprise</button>
        </div>
    </div>

    <div class="main-container">
        <div class="controls-panel">
            <div class="control-section">
                <div class="section-title">Command to Demo</div>
                <div class="control-group">
                    <label class="control-label">Category</label>
                    <select id="commandCategory" onchange="updateCommandList(); updateState()">
                        <option value="welcome">Welcome / Help</option>
                        <option value="calls">Calls</option>
                        <option value="sms">SMS / Messages</option>
                        <option value="numbers">Phone Numbers</option>
                        <option value="applications">Applications</option>
                        <option value="conferences">Conferences</option>
                        <option value="queues">Call Queues</option>
                        <option value="recordings">Recordings</option>
                        <option value="logs">Logs</option>
                        <option value="mcp">MCP / AI Agent</option>
                        <option value="errors">Error Examples</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Command</label>
                    <select id="commandAction" onchange="updateState()">
                        <option value="welcome">freeclimb</option>
                        <option value="help">freeclimb --help</option>
                        <option value="status">freeclimb status</option>
                    </select>
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">Output Options</div>
                <div class="control-group">
                    <label class="control-label">Output Format</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-value="formatted" onclick="setToggle('outputFormat', this)">Formatted</button>
                        <button class="toggle-btn" data-value="json" onclick="setToggle('outputFormat', this)">JSON</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showColors" checked onchange="updateState()">
                        Enable colors
                    </label>
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showIcons" checked onchange="updateState()">
                        Show status icons
                    </label>
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">Sample Data</div>
                <div class="control-group">
                    <label class="control-label">Account Type</label>
                    <select id="accountType" onchange="updateState()">
                        <option value="full">Full Account</option>
                        <option value="trial">Trial Account</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Data Scenario</label>
                    <select id="dataScenario" onchange="updateState()">
                        <option value="normal">Normal (mixed statuses)</option>
                        <option value="success">All Successful</option>
                        <option value="errors">With Errors</option>
                        <option value="empty">Empty Results</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Results Count</label>
                    <select id="resultsCount" onchange="updateState()">
                        <option value="3">3 items</option>
                        <option value="5" selected>5 items</option>
                        <option value="10">10 items</option>
                    </select>
                </div>
            </div>

            <div class="control-section">
                <div class="section-title">Quick Actions</div>
                <div class="quick-actions">
                    <div class="quick-action" onclick="quickDemo('calls:list')">
                        <div class="quick-action-title">calls:list</div>
                        <div class="quick-action-desc">View recent calls</div>
                    </div>
                    <div class="quick-action" onclick="quickDemo('sms:send')">
                        <div class="quick-action-title">sms:send</div>
                        <div class="quick-action-desc">Send a message</div>
                    </div>
                    <div class="quick-action" onclick="quickDemo('status')">
                        <div class="quick-action-title">status</div>
                        <div class="quick-action-desc">Account status</div>
                    </div>
                    <div class="quick-action" onclick="quickDemo('mcp:start')">
                        <div class="quick-action-title">mcp:start</div>
                        <div class="quick-action-desc">Start MCP server</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="preview-panel">
            <div class="view-tabs">
                <button class="view-tab active" onclick="setView('terminal')">Terminal</button>
                <button class="view-tab" onclick="setView('features')">Features</button>
                <button class="view-tab" onclick="setView('commands')">All Commands</button>
            </div>

            <div class="preview-area">
                <div class="terminal" id="terminal">
                    <div class="terminal-header">
                        <div class="terminal-dot red"></div>
                        <div class="terminal-dot yellow"></div>
                        <div class="terminal-dot green"></div>
                    </div>
                    <div id="terminalContent">
                        <!-- Content rendered by JS -->
                    </div>
                </div>
            </div>

            <div class="prompt-output">
                <div class="prompt-header">
                    <span class="prompt-label">Copy this command</span>
                    <button class="copy-btn" onclick="copyPrompt()">Copy</button>
                </div>
                <div class="prompt-text" id="promptText">
                    freeclimb
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        const state = {
            commandCategory: 'welcome',
            commandAction: 'welcome',
            outputFormat: 'formatted',
            showColors: true,
            showIcons: true,
            accountType: 'full',
            dataScenario: 'normal',
            resultsCount: 5,
            currentView: 'terminal'
        };

        // Sample data generators
        const sampleData = {
            calls: () => {
                const statuses = state.dataScenario === 'success' ? ['completed'] :
                               state.dataScenario === 'errors' ? ['completed', 'failed', 'failed', 'busy', 'no-answer'] :
                               ['completed', 'in-progress', 'queued', 'ringing', 'failed'];
                const directions = ['outboundAPI', 'inboundAPI', 'outboundDial'];
                return Array.from({length: parseInt(state.resultsCount)}, (_, i) => ({
                    id: `CA${(1234567890 + i).toString().padStart(32, '0').slice(0, 32)}`,
                    from: `+1555${(1000000 + i).toString().slice(0, 7)}`,
                    to: `+1555${(9000000 - i).toString().slice(0, 7)}`,
                    status: statuses[i % statuses.length],
                    direction: directions[i % directions.length],
                    duration: Math.floor(Math.random() * 300) + 10,
                    created: new Date(Date.now() - i * 3600000).toISOString().replace('T', ' ').slice(0, 19)
                }));
            },
            sms: () => {
                const statuses = state.dataScenario === 'success' ? ['delivered'] :
                               state.dataScenario === 'errors' ? ['delivered', 'failed', 'failed', 'undelivered'] :
                               ['delivered', 'sent', 'queued', 'sending', 'failed'];
                return Array.from({length: parseInt(state.resultsCount)}, (_, i) => ({
                    id: `SM${(9876543210 + i).toString().padStart(32, '0').slice(0, 32)}`,
                    from: `+1555${(1000000 + i).toString().slice(0, 7)}`,
                    to: `+1555${(9000000 - i).toString().slice(0, 7)}`,
                    status: statuses[i % statuses.length],
                    text: ['Hello!', 'Your code is 123456', 'Meeting at 3pm', 'Package delivered', 'Reminder: call back'][i % 5],
                    created: new Date(Date.now() - i * 1800000).toISOString().replace('T', ' ').slice(0, 19)
                }));
            },
            numbers: () => {
                return Array.from({length: Math.min(parseInt(state.resultsCount), 5)}, (_, i) => ({
                    id: `PN${(1111111111 + i).toString().padStart(32, '0').slice(0, 32)}`,
                    phoneNumber: `+1555${(1234567 + i).toString().slice(0, 7)}`,
                    alias: ['Main Line', 'Support', 'Sales', 'Marketing', 'Dev Test'][i],
                    capabilities: { voice: true, sms: true, mms: i < 3 },
                    applicationId: i < 3 ? `AP${(i + 1).toString().padStart(32, '0')}` : null
                }));
            },
            applications: () => {
                return Array.from({length: Math.min(parseInt(state.resultsCount), 5)}, (_, i) => ({
                    id: `AP${(2222222222 + i).toString().padStart(32, '0').slice(0, 32)}`,
                    alias: ['IVR System', 'SMS Bot', 'Call Center', 'Notifications', 'Dev App'][i],
                    voiceUrl: `https://api.example.com/voice/${i + 1}`,
                    smsUrl: i < 3 ? `https://api.example.com/sms/${i + 1}` : null,
                    status: 'active'
                }));
            },
            conferences: () => {
                const statuses = ['inProgress', 'terminated', 'empty'];
                return Array.from({length: Math.min(parseInt(state.resultsCount), 4)}, (_, i) => ({
                    id: `CF${(3333333333 + i).toString().padStart(32, '0').slice(0, 32)}`,
                    alias: ['Team Standup', 'Client Call', 'All Hands', 'Support'][i],
                    status: statuses[i % statuses.length],
                    participants: Math.floor(Math.random() * 10) + 1,
                    created: new Date(Date.now() - i * 7200000).toISOString().replace('T', ' ').slice(0, 19)
                }));
            },
            queues: () => {
                return Array.from({length: Math.min(parseInt(state.resultsCount), 4)}, (_, i) => ({
                    id: `QU${(4444444444 + i).toString().padStart(32, '0').slice(0, 32)}`,
                    alias: ['Support Queue', 'Sales Queue', 'VIP Queue', 'General'][i],
                    currentSize: Math.floor(Math.random() * 20),
                    maxSize: 100,
                    averageWaitTime: Math.floor(Math.random() * 120) + 30
                }));
            },
            recordings: () => {
                return Array.from({length: parseInt(state.resultsCount)}, (_, i) => ({
                    id: `RE${(5555555555 + i).toString().padStart(32, '0').slice(0, 32)}`,
                    callId: `CA${(1234567890 + i).toString().padStart(32, '0').slice(0, 32)}`,
                    duration: Math.floor(Math.random() * 300) + 30,
                    created: new Date(Date.now() - i * 86400000).toISOString().replace('T', ' ').slice(0, 19)
                }));
            },
            logs: () => {
                const levels = state.dataScenario === 'errors' ? ['ERROR', 'WARNING', 'ERROR', 'INFO'] : ['INFO', 'INFO', 'WARNING', 'INFO', 'DEBUG'];
                const messages = [
                    'Incoming call received',
                    'SMS delivered successfully',
                    'Call connected',
                    'Application webhook called',
                    'Conference participant joined',
                    'Rate limit warning',
                    'API authentication failed',
                    'Recording started'
                ];
                return Array.from({length: parseInt(state.resultsCount)}, (_, i) => ({
                    timestamp: new Date(Date.now() - i * 60000).toISOString(),
                    level: levels[i % levels.length],
                    requestId: `REQ${Math.random().toString(36).slice(2, 10).toUpperCase()}`,
                    message: messages[i % messages.length]
                }));
            }
        };

        // ASCII Banner
        const banner = `███████╗██████╗ ███████╗███████╗ ██████╗██╗     ██╗███╗   ███╗██████╗
██╔════╝██╔══██╗██╔════╝██╔════╝██╔════╝██║     ██║████╗ ████║██╔══██╗
█████╗  ██████╔╝█████╗  █████╗  ██║     ██║     ██║██╔████╔██║██████╔╝
██╔══╝  ██╔══██╗██╔══╝  ██╔══╝  ██║     ██║     ██║██║╚██╔╝██║██╔══██╗
██║     ██║  ██║███████╗███████╗╚██████╗███████╗██║██║ ╚═╝ ██║██████╔╝
╚═╝     ╚═╝  ╚═╝╚══════╝╚══════╝ ╚═════╝╚══════╝╚═╝╚═╝     ╚═╝╚═════╝ `;

        // Command list configurations
        const commandLists = {
            welcome: [
                { value: 'welcome', label: 'freeclimb' },
                { value: 'help', label: 'freeclimb --help' },
                { value: 'status', label: 'freeclimb status' },
                { value: 'diagnose', label: 'freeclimb diagnose' }
            ],
            calls: [
                { value: 'calls:list', label: 'freeclimb calls:list' },
                { value: 'calls:get', label: 'freeclimb calls:get <id>' },
                { value: 'calls:make', label: 'freeclimb calls:make' },
                { value: 'calls:update', label: 'freeclimb calls:update <id>' }
            ],
            sms: [
                { value: 'sms:list', label: 'freeclimb sms:list' },
                { value: 'sms:get', label: 'freeclimb sms:get <id>' },
                { value: 'sms:send', label: 'freeclimb sms:send' }
            ],
            numbers: [
                { value: 'incoming-numbers:list', label: 'freeclimb incoming-numbers:list' },
                { value: 'incoming-numbers:get', label: 'freeclimb incoming-numbers:get <id>' },
                { value: 'incoming-numbers:buy', label: 'freeclimb incoming-numbers:buy' },
                { value: 'available-numbers:list', label: 'freeclimb available-numbers:list' }
            ],
            applications: [
                { value: 'applications:list', label: 'freeclimb applications:list' },
                { value: 'applications:get', label: 'freeclimb applications:get <id>' },

        function updateCommandList() {
            const category = document.getElementById('commandCategory').value;
            const actionSelect = document.getElementById('commandAction');
            const commands = commandLists[category] || commandLists.welcome;

            actionSelect.innerHTML = commands.map(cmd =>
                `<option value="${cmd.value}">${cmd.label}</option>`
            ).join('');

            state.commandCategory = category;
            state.commandAction = commands[0].value;
        }

        function updateState() {
            state.commandCategory = document.getElementById('commandCategory').value;
            state.commandAction = document.getElementById('commandAction').value;
            state.showColors = document.getElementById('showColors').checked;
            state.showIcons = document.getElementById('showIcons').checked;
            state.accountType = document.getElementById('accountType').value;
            state.dataScenario = document.getElementById('dataScenario').value;
            state.resultsCount = document.getElementById('resultsCount').value;

            renderPreview();
            updatePromptText();
        }

        function setToggle(key, btn) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state[key] = btn.dataset.value;
            updateState();
        }

        function setView(view) {
            state.currentView = view;
            document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.view-tab[onclick="setView('${view}')"]`).classList.add('active');
            renderPreview();
        }

        function applyPreset(name) {
            Object.assign(state, presets[name]);

            // Update controls
            document.getElementById('commandCategory').value = state.commandCategory;
            updateCommandList();
            document.getElementById('commandAction').value = state.commandAction;
            document.getElementById('showColors').checked = state.showColors;
            document.getElementById('showIcons').checked = state.showIcons;
            document.getElementById('accountType').value = state.accountType;
            document.getElementById('dataScenario').value = state.dataScenario;
            document.getElementById('resultsCount').value = state.resultsCount;

            // Update toggles
            document.querySelectorAll('[data-value]').forEach(btn => {
                if (btn.closest('.control-group')?.querySelector('.control-label')?.textContent === 'Output Format') {
                    btn.classList.toggle('active', btn.dataset.value === state.outputFormat);
                }
            });

            // Update preset buttons
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.preset-btn[onclick="applyPreset('${name}')"]`).classList.add('active');

            renderPreview();
            updatePromptText();
        }

        function quickDemo(cmd) {
            const categoryMap = {

            };

            const category = categoryMap[cmd] || 'welcome';
            document.getElementById('commandCategory').value = category;
            updateCommandList();

            renderPreview();
            updatePromptText();

        function span(text, className) {
            return state.showColors ? `<span class="${className}">${escapeHtml(text)}</span>` : escapeHtml(text);
        }

        function color(text, colorVar) {
            return state.showColors ? `<span style="color: var(${colorVar})">${escapeHtml(text)}</span>` : escapeHtml(text);
        }

        function escapeHtml(text) {
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function statusIcon(status) {
            if (!state.showIcons) return '';
            const icons = {
                completed: '✔ ', delivered: '✔ ', active: '● ', inProgress: '● ',
                'in-progress': '⏳ ', queued: '⏳ ', pending: '⏳ ', ringing: '⏳ ', sending: '⏳ ', sent: '⏳ ',
                failed: '✘ ', error: '✘ ', busy: '✘ ', 'no-answer': '✘ ', undelivered: '✘ ',
                terminated: '○ ', empty: '○ '
            };
            return icons[status] || '';
        }

        function statusClass(status) {
            const classes = {
                completed: 'status-completed', delivered: 'status-completed', active: 'status-active', inProgress: 'status-active',
                'in-progress': 'status-in-progress', queued: 'status-queued', pending: 'status-pending', ringing: 'status-pending', sending: 'status-pending', sent: 'status-pending',
                failed: 'status-failed', error: 'status-error', busy: 'status-failed', 'no-answer': 'status-failed', undelivered: 'status-failed'
            };
            return state.showColors ? (classes[status] || '') : '';
        }

        function renderPreview() {
            const content = document.getElementById('terminalContent');

            if (state.currentView === 'features') {
                content.innerHTML = renderFeatures();
                return;
            }

            if (state.currentView === 'commands') {
                content.innerHTML = renderAllCommands();
                return;
            }

            // Terminal view
            let html = renderCommandLine();
            html += '<div style="margin-top: 12px">' + renderOutput() + '</div>';
            content.innerHTML = html;
        }

        function renderCommandLine() {
            const actionSelect = document.getElementById('commandAction');
            const cmdLabel = actionSelect.options[actionSelect.selectedIndex]?.text || 'freeclimb';
            return `<div class="command-input-wrapper">
                <span class="command-prompt">$</span>
                <span class="command-text">${escapeHtml(cmdLabel)}</span>
                <span class="cursor"></span>
            </div>`;
        }

        function renderOutput() {
            const action = state.commandAction;

            // JSON output
            if (state.outputFormat === 'json') {
                return renderJsonOutput();
            }

            // Formatted output
            switch (action) {
                case 'welcome': return renderWelcome();
                case 'help': return renderHelp();
                case 'status': return renderStatus();
                case 'diagnose': return renderDiagnose();
                case 'calls:list': return renderCallsList();
                case 'calls:get': return renderCallDetail();
                case 'calls:make': return renderCallMade();
                case 'sms:list': return renderSmsList();
                case 'sms:send': return renderSmsSent();
                case 'incoming-numbers:list': return renderNumbersList();
                case 'available-numbers:list': return renderAvailableNumbers();
                case 'applications:list': return renderApplicationsList();
                case 'conferences:list': return renderConferencesList();
                case 'call-queues:list': return renderQueuesList();
                case 'recordings:list': return renderRecordingsList();
                case 'logs:list': return renderLogsList();
                case 'mcp:start': return renderMcpStart();
                case 'mcp:config': return renderMcpConfig();
                case 'error:auth': return renderErrorAuth();
                case 'error:notfound': return renderErrorNotFound();
                case 'error:validation': return renderErrorValidation();
                case 'error:ratelimit': return renderErrorRateLimit();
                default: return renderWelcome();

                    <div>  ${color('1.', '--text-secondary')} ${color('freeclimb login', '--accent-orange')} to re-authenticate</div>
                    <div>  ${color('2.', '--text-secondary')} Check credentials at ${color('https://freeclimb.com/dashboard', '--accent-orange')}</div>
                </div>`;
        }

        function renderErrorNotFound() {
            return `<div style="color: var(--accent-red)">${statusIcon('failed')}Error: Resource not found</div>
                <div class="term-box" style="margin-top: 12px; border-color: var(--accent-red)">
                    <div>${color('Code', '--text-secondary').padEnd(20)} NOT_FOUND</div>
                    <div>${color('Resource', '--text-secondary').padEnd(20)} Call CA1234567890...</div>
                    <div>${color('Message', '--text-secondary').padEnd(20)} The specified call does not exist</div>
                </div>
                <div style="margin-top: 16px">
                    <div style="opacity: 0.6">Try:</div>
                    <div>  ${color('›', '--accent-orange')} ${color('freeclimb calls:list', '--accent-orange')} to see available calls</div>
                </div>`;
        }

        function renderErrorValidation() {
            return `<div style="color: var(--accent-red)">${statusIcon('failed')}Error: Invalid phone number format</div>
                <div class="term-box" style="margin-top: 12px; border-color: var(--accent-red)">
                    <div>${color('Code', '--text-secondary').padEnd(20)} INVALID_PHONE_NUMBER</div>
                    <div>${color('Input', '--text-secondary').padEnd(20)} 123-456-7890</div>
                    <div>${color('Expected', '--text-secondary').padEnd(20)} E.164 format (+15551234567)</div>
                </div>
                <div style="margin-top: 16px">
                    <div style="opacity: 0.6">Example:</div>
                    <div>  ${color('freeclimb sms:send +15551234567 +15559876543 "Hello"', '--accent-orange')}</div>
                </div>`;
        }

        function renderErrorRateLimit() {
            return `<div style="color: var(--accent-red)">${statusIcon('failed')}Error: Rate limit exceeded</div>
                <div class="term-box" style="margin-top: 12px; border-color: var(--accent-red)">
                    <div>${color('Code', '--text-secondary').padEnd(20)} RATE_LIMIT_EXCEEDED</div>
                    <div>${color('Limit', '--text-secondary').padEnd(20)} 100 requests/minute</div>
                    <div>${color('Retry After', '--text-secondary').padEnd(20)} 45 seconds</div>
                </div>
                <div class="info-callout" style="border-color: var(--accent-orange)">
                    Consider implementing exponential backoff in your scripts.
                </div>`;
        }

        function renderEmptyState(resource, createCmd) {
            let html = `<div style="text-align: center; padding: 24px; opacity: 0.7">
                <div style="font-size: 24px; margin-bottom: 8px">○</div>
                <div>No ${resource} found</div>
            </div>`;
            if (createCmd) {
                html += `<div style="text-align: center; margin-top: 12px">
                    <span style="opacity: 0.6">Create one with</span> ${color(createCmd, '--accent-orange')}
                </div>`;
            }
            return html;
        }

        function renderTable(title, headers, rows, footer, nextCmd) {
            const colWidths = headers.map((h, i) =>
                Math.max(h.length, ...rows.map(r => {
                    const cell = r[i];
                    const text = typeof cell === 'object' ? cell.value : cell;
                    return String(text).length;
                })) + 2
            );

            let html = `<div class="term-table">`;
            html += `<div style="color: var(--accent-orange); font-weight: bold; margin-bottom: 8px">${title}</div>`;

            // Headers
            html += `<div class="term-table-header">`;
            headers.forEach((h, i) => {
                html += `<span style="display: inline-block; width: ${colWidths[i] * 8}px">${h}</span>`;
            });
            html += `</div>`;

            // Separator
            html += `<div class="term-table-separator">${'─'.repeat(colWidths.reduce((a, b) => a + b, 0))}</div>`;

            // Rows
            rows.forEach(row => {
                html += `<div class="term-table-row">`;
                row.forEach((cell, i) => {
                    const text = typeof cell === 'object' ? cell.value : cell;
                    const className = typeof cell === 'object' ? cell.class || '' : '';
                    const style = typeof cell === 'object' && cell.style ? cell.style : '';
                    const dim = typeof cell === 'object' && cell.dim;
                    html += `<span style="display: inline-block; width: ${colWidths[i] * 8}px; ${dim ? 'opacity: 0.6;' : ''} ${style}" class="${className}">${escapeHtml(text)}</span>`;
                });
                html += `</div>`;
            });

            html += `</div>`;

            if (footer) {
                html += `<div style="margin-top: 12px; opacity: 0.6">${footer}</div>`;
            }
            if (nextCmd) {
                html += `<div style="margin-top: 4px">  ${color('›', '--accent-orange')} ${color(nextCmd, '--accent-orange')} for more</div>`;
            }

            return html;
        }

        function renderJsonOutput() {
            const action = state.commandAction;
            let data;

            switch (action) {
                case 'status':
                    data = {
                        accountId: 'AC' + '1234567890abcdef'.repeat(2).slice(0, 30),
                        type: state.accountType === 'trial' ? 'trial' : 'full',
                        status: 'active',
                        balance: state.accountType === 'trial' ? 10.00 : 250.00
                    };
                    break;
                case 'calls:list':
                    data = { calls: state.dataScenario === 'empty' ? [] : sampleData.calls(), total: 127, offset: 0, limit: parseInt(state.resultsCount) };
                    break;
                case 'sms:list':
                    data = { messages: state.dataScenario === 'empty' ? [] : sampleData.sms(), total: 89, offset: 0, limit: parseInt(state.resultsCount) };
                    break;
                case 'incoming-numbers:list':
                    data = { incomingPhoneNumbers: state.dataScenario === 'empty' ? [] : sampleData.numbers() };
                    break;
                case 'applications:list':
                    data = { applications: state.dataScenario === 'empty' ? [] : sampleData.applications() };
                    break;
                case 'mcp:start':
                    data = { status: 'running', transport: 'stdio', tools: 15 };
                    break;
                default:
                    data = { message: 'Command executed successfully' };
            }

            return `<pre style="color: var(--text-primary); font-size: 12px">${JSON.stringify(data, null, 2)}</pre>`;
        }

        function renderFeatures() {
            return `<div style="padding: 8px">
                <h2 style="color: var(--accent-orange); margin-bottom: 16px">FreeClimb CLI Features</h2>

                <div class="term-box">
                    <div class="term-box-title">Voice & Calls</div>
                    <div>• Make outbound calls programmatically</div>
                    <div>• List and filter call history</div>
                    <div>• Update active calls (hold, transfer, hangup)</div>
                    <div>• Access call recordings</div>
                </div>

                <div class="term-box">
                    <div class="term-box-title">SMS & Messaging</div>
                    <div>• Send SMS messages to any number</div>
                    <div>• Track delivery status</div>
                    <div>• View message history</div>
                </div>

                <div class="term-box">
                    <div class="term-box-title">Phone Numbers</div>
                    <div>• Search and buy phone numbers</div>
                    <div>• Configure voice/SMS capabilities</div>
                    <div>• Assign to applications</div>
                </div>

                <div class="term-box">
                    <div class="term-box-title">AI Agent Integration (MCP)</div>
                    <div>• Built-in MCP server for AI agents</div>
                    <div>• 15+ tools for Claude and other agents</div>
                    <div>• Automate communications workflows</div>
                </div>

                <div class="term-box">
                    <div class="term-box-title">Developer Experience</div>
                    <div>• Secure credential storage (OS keychain)</div>
                    <div>• JSON output for scripting</div>
                    <div>• Pagination for large result sets</div>
                    <div>• Colorized, readable output</div>
                </div>
            </div>`;
        }

        function renderAllCommands() {
            const categories = [
                { name: 'Authentication', cmds: ['login', 'logout', 'status', 'diagnose'] },
                { name: 'Calls', cmds: ['calls:list', 'calls:get', 'calls:make', 'calls:update'] },
                { name: 'SMS', cmds: ['sms:list', 'sms:get', 'sms:send'] },
                { name: 'Phone Numbers', cmds: ['incoming-numbers:list', 'incoming-numbers:get', 'incoming-numbers:buy', 'incoming-numbers:update', 'incoming-numbers:delete', 'available-numbers:list'] },
                { name: 'Applications', cmds: ['applications:list', 'applications:get', 'applications:create', 'applications:update', 'applications:delete'] },
                { name: 'Conferences', cmds: ['conferences:list', 'conferences:get', 'conferences:create', 'conference-participants:list', 'conference-participants:update'] },
                { name: 'Call Queues', cmds: ['call-queues:list', 'call-queues:get', 'call-queues:create', 'queue-members:list', 'queue-members:dequeue'] },
                { name: 'Recordings', cmds: ['recordings:list', 'recordings:get', 'recordings:delete', 'recordings:download', 'recordings:stream'] },
                { name: 'Logs', cmds: ['logs:list', 'logs:filter'] },
                { name: 'MCP', cmds: ['mcp:start', 'mcp:config'] },
                { name: 'Advanced', cmds: ['api <endpoint>'] }
            ];

            let html = '<div style="padding: 8px">';
            html += `<h2 style="color: var(--accent-orange); margin-bottom: 16px">All Commands (54+)</h2>`;

            for (const cat of categories) {
                html += `<div class="term-box">
                    <div class="term-box-title">${cat.name}</div>
                    ${cat.cmds.map(c => `<div style="padding: 2px 0">${color('freeclimb ' + c, '--accent-teal-light')}</div>`).join('')}
                </div>`;
            }

            html += '</div>';
            return html;
        }

        function updatePromptText() {
            const actionSelect = document.getElementById('commandAction');
            const cmdLabel = actionSelect.options[actionSelect.selectedIndex]?.text || 'freeclimb';
            let cmd = cmdLabel;

            if (state.outputFormat === 'json' && !cmd.includes('--json')) {
                cmd += ' --json';
            }

            document.getElementById('promptText').textContent = cmd;
        }

        function copyPrompt() {
            const text = document.getElementById('promptText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Initialize
        updateCommandList();
        renderPreview();
        updatePromptText();
    </script>
</body>
</html>
