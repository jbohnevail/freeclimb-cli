<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeClimb CLI Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .preset-bar {
            display: flex;
            gap: 6px;
        }

        .preset-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.15s;
        }

        .preset-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .preset-btn.active {
            background: #004e63;
            border-color: #26697a;
            color: white;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .controls-panel {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .controls-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-tertiary);
        }

        .controls-tab {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .controls-tab:hover {
            color: var(--text-primary);
        }

        .controls-tab.active {
            color: #fa660a;
            border-bottom-color: #fa660a;
            background: var(--bg-secondary);
        }

        .controls-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .terminal {
            background: #0a0a0a;
            border-radius: 8px;
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            min-height: 100%;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            border-radius: 8px 8px 0 0;
        }

        .terminal-dots {
            display: flex;
            gap: 6px;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-dot.red { background: #ff5f56; }
        .terminal-dot.yellow { background: #ffbd2e; }
        .terminal-dot.green { background: #27c93f; }

        .terminal-title {
            flex: 1;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .terminal-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .prompt-output {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 12px 16px;
        }

        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .prompt-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            background: #fa660a;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .copy-btn:hover {
            filter: brightness(1.1);
        }

        .copy-btn.copied {
            background: #c2ff18;
            color: #000;
        }

        .prompt-text {
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 11px;
            color: var(--text-primary);
            background: var(--bg-tertiary);
            padding: 10px;
            border-radius: 5px;
            white-space: pre-wrap;
            max-height: 120px;
            overflow-y: auto;
        }

        /* Control Styling */
        .control-section {
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .control-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        input[type="text"],
        select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 8px;
            border-radius: 5px;
            font-size: 12px;
            width: 100%;
        }

        input[type="color"] {
            width: 32px;
            height: 28px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
            padding: 0;
        }

        .toggle-group {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            flex: 1;
            min-width: 50px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 8px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.15s;
            border-radius: 4px;
        }

        .toggle-btn:hover {
            background: var(--border-color);
        }

        .toggle-btn.active {
            background: #004e63;
            border-color: #26697a;
            color: white;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-primary);
        }

        .checkbox-label input {
            accent-color: #fa660a;
            width: 14px;
            height: 14px;
        }

        /* Quick action cards */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .quick-action {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .quick-action:hover {
            border-color: #fa660a;
        }

        .quick-action-title {
            font-size: 11px;
            font-weight: 600;
            color: #fa660a;
        }

        .quick-action-desc {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* View tabs */
        .view-tabs {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 16px;
        }

        .view-tab {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 14px;
            cursor: pointer;
            font-size: 12px;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .view-tab:hover {
            color: var(--text-primary);
        }

        .view-tab.active {
            color: #fa660a;
            border-bottom-color: #fa660a;
        }

        /* Terminal content styles */
        .term-banner {
            white-space: pre;
            margin-bottom: 12px;
        }

        .term-tagline {
            margin-bottom: 16px;
            padding-left: 2px;
        }

        .term-dim { opacity: 0.6; }
        .term-bold { font-weight: bold; }

        .command-input-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .command-prompt {
            margin-right: 8px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--text-primary);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        .term-box {
            border-radius: 6px;
            padding: 10px 14px;
            margin: 8px 0;
        }

        .term-box-title {
            font-weight: bold;
            margin-bottom: 6px;
            padding-bottom: 4px;
        }

        .term-table {
            margin: 8px 0;
        }

        .term-table-header {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .term-table-separator {
            margin-bottom: 6px;
        }

        .term-table-row {
            margin-bottom: 1px;
        }

        .info-callout {
            border-left: 3px solid;
            padding: 8px 12px;
            margin: 12px 0;
            font-size: 12px;
            background: rgba(250, 102, 10, 0.1);
        }

        /* Color swatch display */
        .color-swatches {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .color-swatch {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .swatch-preview {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .swatch-label {
            font-size: 9px;
            color: var(--text-muted);
        }

        /* Collapsible sections */
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 6px 0;
        }

        .collapsible-header:hover {
            color: var(--text-primary);
        }

        .collapsible-content {
            overflow: hidden;
            transition: max-height 0.2s ease;
        }

        .collapsible-content.collapsed {
            max-height: 0;
        }

        .chevron {
            transition: transform 0.2s;
        }

        .chevron.collapsed {
            transform: rotate(-90deg);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div>
                <h1>FreeClimb CLI Playground</h1>
                <span class="header-subtitle">Interactive demo & design customizer</span>
            </div>
        </div>
        <div class="preset-bar">
            <button class="preset-btn active" onclick="applyPreset('default')">Default</button>
            <button class="preset-btn" onclick="applyPreset('vibrant')">Vibrant</button>
            <button class="preset-btn" onclick="applyPreset('minimal')">Minimal</button>
            <button class="preset-btn" onclick="applyPreset('hacker')">Hacker</button>
            <button class="preset-btn" onclick="applyPreset('corporate')">Corporate</button>
        </div>
    </div>

    <div class="main-container">
        <div class="controls-panel">
            <div class="controls-tabs">
                <button class="controls-tab active" onclick="setControlTab('commands')">Commands</button>
                <button class="controls-tab" onclick="setControlTab('theme')">Theme</button>
                <button class="controls-tab" onclick="setControlTab('layout')">Layout</button>
            </div>

            <div class="controls-content">
                <!-- Commands Tab -->
                <div id="tab-commands" class="tab-panel active">
                    <div class="control-section">
                        <div class="section-title">Command</div>
                        <div class="control-group">
                            <label class="control-label">Category</label>
                            <select id="commandCategory" onchange="updateCommandList(); updateAll()">
                                <option value="welcome">Welcome / Help</option>
                                <option value="calls">Calls</option>
                                <option value="sms">SMS / Messages</option>
                                <option value="numbers">Phone Numbers</option>
                                <option value="applications">Applications</option>
                                <option value="conferences">Conferences</option>
                                <option value="queues">Call Queues</option>
                                <option value="recordings">Recordings</option>
                                <option value="logs">Logs</option>
                                <option value="mcp">MCP / AI Agent</option>
                                <option value="errors">Error Examples</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Action</label>
                            <select id="commandAction" onchange="updateAll()">
                                <option value="welcome">freeclimb</option>
                            </select>
                        </div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Output</div>
                        <div class="control-group">
                            <label class="control-label">Format</label>
                            <div class="toggle-group">
                                <button class="toggle-btn active" data-group="outputFormat" data-value="formatted" onclick="setToggle(this)">Formatted</button>
                                <button class="toggle-btn" data-group="outputFormat" data-value="json" onclick="setToggle(this)">JSON</button>
                            </div>
                        </div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Sample Data</div>
                        <div class="control-group">
                            <label class="control-label">Account Type</label>
                            <select id="accountType" onchange="updateAll()">
                                <option value="full">Full Account</option>
                                <option value="trial">Trial Account</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Scenario</label>
                            <select id="dataScenario" onchange="updateAll()">
                                <option value="normal">Normal (mixed)</option>
                                <option value="success">All Successful</option>
                                <option value="errors">With Errors</option>
                                <option value="empty">Empty Results</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Results</label>
                            <select id="resultsCount" onchange="updateAll()">
                                <option value="3">3 items</option>
                                <option value="5" selected>5 items</option>
                                <option value="10">10 items</option>
                            </select>
                        </div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Quick Actions</div>
                        <div class="quick-actions">
                            <div class="quick-action" onclick="quickDemo('welcome', 'welcome')">
                                <div class="quick-action-title">Welcome</div>
                                <div class="quick-action-desc">Home screen</div>
                            </div>
                            <div class="quick-action" onclick="quickDemo('welcome', 'status')">
                                <div class="quick-action-title">Status</div>
                                <div class="quick-action-desc">Account info</div>
                            </div>
                            <div class="quick-action" onclick="quickDemo('calls', 'calls:list')">
                                <div class="quick-action-title">Calls</div>
                                <div class="quick-action-desc">List calls</div>
                            </div>
                            <div class="quick-action" onclick="quickDemo('sms', 'sms:list')">
                                <div class="quick-action-title">SMS</div>
                                <div class="quick-action-desc">Messages</div>
                            </div>
                            <div class="quick-action" onclick="quickDemo('mcp', 'mcp:start')">
                                <div class="quick-action-title">MCP</div>
                                <div class="quick-action-desc">AI agents</div>
                            </div>
                            <div class="quick-action" onclick="quickDemo('errors', 'error:validation')">
                                <div class="quick-action-title">Error</div>
                                <div class="quick-action-desc">Error output</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Theme Tab -->
                <div id="tab-theme" class="tab-panel">
                    <div class="control-section">
                        <div class="section-title">Brand Colors</div>

                        <div class="control-group">
                            <label class="control-label">Primary (Banner/Headers)</label>
                            <div class="control-row">
                                <input type="color" id="colorPrimary" value="#004e63" onchange="updateAll()">
                                <input type="text" id="colorPrimaryHex" value="#004e63" onchange="syncColor('Primary')">
                            </div>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Secondary (Commands)</label>
                            <div class="control-row">
                                <input type="color" id="colorSecondary" value="#26697a" onchange="updateAll()">
                                <input type="text" id="colorSecondaryHex" value="#26697a" onchange="syncColor('Secondary')">
                            </div>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Accent (Highlights)</label>
                            <div class="control-row">
                                <input type="color" id="colorAccent" value="#fa660a" onchange="updateAll()">
                                <input type="text" id="colorAccentHex" value="#fa660a" onchange="syncColor('Accent')">
                            </div>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Success</label>
                            <div class="control-row">
                                <input type="color" id="colorSuccess" value="#c2ff18" onchange="updateAll()">
                                <input type="text" id="colorSuccessHex" value="#c2ff18" onchange="syncColor('Success')">
                            </div>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Error</label>
                            <div class="control-row">
                                <input type="color" id="colorError" value="#f85149" onchange="updateAll()">
                                <input type="text" id="colorErrorHex" value="#f85149" onchange="syncColor('Error')">
                            </div>
                        </div>

                        <div class="color-swatches" id="colorSwatches"></div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Icons</div>

                        <div class="control-group">
                            <label class="control-label">Success Icon</label>
                            <select id="iconSuccess" onchange="updateAll()">
                                <option value="вң“">вң“ Checkmark</option>
                                <option value="вң”" selected>вң” Heavy Check</option>
                                <option value="в—Ҹ">в—Ҹ Filled Circle</option>
                                <option value="вң…">вң… Emoji</option>
                                <option value="[OK]">[OK] Text</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Error Icon</label>
                            <select id="iconError" onchange="updateAll()">
                                <option value="вң—">вң— X Mark</option>
                                <option value="вңҳ" selected>вңҳ Heavy X</option>
                                <option value="в—Ӣ">в—Ӣ Empty Circle</option>
                                <option value="вқҢ">вқҢ Emoji</option>
                                <option value="[FAIL]">[FAIL] Text</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Pending Icon</label>
                            <select id="iconPending" onchange="updateAll()">
                                <option value="в—Ӣ">в—Ӣ Empty Circle</option>
                                <option value="в—җ">в—җ Half Circle</option>
                                <option value="вҸі" selected>вҸі Hourglass</option>
                                <option value="в§–">в§– Hourglass Alt</option>
                                <option value="...">... Dots</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Arrow/Chevron</label>
                            <select id="iconArrow" onchange="updateAll()">
                                <option value="вҶ’">вҶ’ Arrow</option>
                                <option value="вҖә" selected>вҖә Chevron</option>
                                <option value="в–¶">в–¶ Triangle</option>
                                <option value="->">>> ASCII</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="showIcons" checked onchange="updateAll()">
                                Show status icons
                            </label>
                        </div>

                        <div class="control-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="colorizeStatus" checked onchange="updateAll()">
                                Colorize status values
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Layout Tab -->
                <div id="tab-layout" class="tab-panel">
                    <div class="control-section">
                        <div class="section-title">Banner</div>

                        <div class="control-group">
                            <label class="control-label">Style</label>
                            <select id="bannerType" onchange="updateAll()">
                                <option value="block">Block Letters (в–Ҳв–Ҳв–Ҳ)</option>
                                <option value="slant">Slant Style</option>
                                <option value="simple">Simple ASCII</option>
                                <option value="none">No Banner</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label class="control-label">Tagline</label>
                            <input type="text" id="tagline" value="The communications CLI for developers and agents" onchange="updateAll()">
                        </div>

                        <div class="control-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="showTagline" checked onchange="updateAll()">
                                Show tagline
                            </label>
                        </div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Tables & Boxes</div>

                        <div class="control-group">
                            <label class="control-label">Border Style</label>
                            <div class="toggle-group">
                                <button class="toggle-btn" data-group="borderStyle" data-value="rounded" onclick="setToggle(this)">Rounded</button>
                                <button class="toggle-btn" data-group="borderStyle" data-value="square" onclick="setToggle(this)">Square</button>
                                <button class="toggle-btn" data-group="borderStyle" data-value="ascii" onclick="setToggle(this)">ASCII</button>
                                <button class="toggle-btn active" data-group="borderStyle" data-value="none" onclick="setToggle(this)">None</button>
                            </div>
                        </div>

                        <div class="control-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="showTimestamps" checked onchange="updateAll()">
                                Show timestamps
                            </label>
                        </div>

                        <div class="control-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="compactOutput" onchange="updateAll()">
                                Compact output
                            </label>
                        </div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Welcome Screen</div>

                        <div class="control-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="showQuickCommands" checked onchange="updateAll()">
                                Show command list
                            </label>
                        </div>

        // Sample data generators
        function generateCalls() {
            const statuses = state.dataScenario === 'success' ? ['completed'] :
                           state.dataScenario === 'errors' ? ['completed', 'failed', 'failed', 'busy', 'no-answer'] :
                           ['completed', 'in-progress', 'queued', 'ringing', 'failed'];
            return Array.from({length: parseInt(state.resultsCount)}, (_, i) => ({
                id: `CA${(1234567890 + i).toString().padStart(32, '0').slice(0, 32)}`,
                from: `+1555${(1000000 + i).toString().slice(0, 7)}`,
                to: `+1555${(9000000 - i).toString().slice(0, 7)}`,
                status: statuses[i % statuses.length],
                duration: Math.floor(Math.random() * 300) + 10,
                created: new Date(Date.now() - i * 3600000).toISOString().replace('T', ' ').slice(0, 19)
            }));
        }

        function generateSms() {
            const statuses = state.dataScenario === 'success' ? ['delivered'] :
                           state.dataScenario === 'errors' ? ['delivered', 'failed', 'undelivered'] :
                           ['delivered', 'sent', 'queued', 'sending', 'failed'];
            return Array.from({length: parseInt(state.resultsCount)}, (_, i) => ({
                id: `SM${(9876543210 + i).toString().padStart(32, '0').slice(0, 32)}`,
                from: `+1555${(1000000 + i).toString().slice(0, 7)}`,
                to: `+1555${(9000000 - i).toString().slice(0, 7)}`,
                status: statuses[i % statuses.length],
                text: ['Hello!', 'Code: 123456', 'Meeting 3pm', 'Package here', 'Call back'][i % 5],
                created: new Date(Date.now() - i * 1800000).toISOString().replace('T', ' ').slice(0, 19)
            }));
        }

        function generateNumbers() {
            return Array.from({length: Math.min(parseInt(state.resultsCount), 5)}, (_, i) => ({
                id: `PN${(1111111111 + i).toString().padStart(32, '0').slice(0, 32)}`,
                phoneNumber: `+1555${(1234567 + i).toString().slice(0, 7)}`,
                alias: ['Main', 'Support', 'Sales', 'Marketing', 'Dev'][i],
                voice: true, sms: true
            }));

            return Array.from({length: Math.min(parseInt(state.resultsCount), 5)}, (_, i) => ({
                id: `AP${(2222222222 + i).toString().padStart(32, '0').slice(0, 32)}`,
                alias: ['IVR', 'SMS Bot', 'Call Center', 'Notify', 'Dev'][i],
                voiceUrl: `https://api.example.com/v/${i + 1}`
            }));

        function generateConferences() {
            const statuses = ['inProgress', 'terminated', 'empty'];
            return Array.from({length: Math.min(parseInt(state.resultsCount), 4)}, (_, i) => ({
                id: `CF${(3333333333 + i).toString().padStart(32, '0').slice(0, 32)}`,
                alias: ['Standup', 'Client', 'All Hands', 'Support'][i],
                status: statuses[i % statuses.length],
                participants: Math.floor(Math.random() * 10) + 1
            }));

                id: `QU${(4444444444 + i).toString().padStart(32, '0').slice(0, 32)}`,
                alias: ['Support', 'Sales', 'VIP', 'General'][i],
                currentSize: Math.floor(Math.random() * 20),
                maxSize: 100,

            }));

            }));

        function generateLogs() {
            const levels = state.dataScenario === 'errors' ? ['ERROR', 'WARNING', 'ERROR'] : ['INFO', 'INFO', 'WARNING', 'DEBUG'];
            const messages = ['Incoming call', 'SMS delivered', 'Call connected', 'Webhook called', 'Rate limit'];
            return Array.from({length: parseInt(state.resultsCount)}, (_, i) => ({
                timestamp: new Date(Date.now() - i * 60000).toISOString(),
                level: levels[i % levels.length],
                requestId: `REQ${Math.random().toString(36).slice(2, 8).toUpperCase()}`,
                message: messages[i % messages.length]
            }));
        }

        // UI helpers
        function escapeHtml(text) {
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function color(text, colorValue) {
            return state.colorizeStatus ? `<span style="color: ${colorValue}">${escapeHtml(text)}</span>` : escapeHtml(text);
        }

        function statusIcon(status) {
            if (!state.showIcons) return '';
            const icons = {
                completed: state.iconSuccess, delivered: state.iconSuccess, active: 'в—Ҹ', inProgress: 'в—Ҹ',
                'in-progress': state.iconPending, queued: state.iconPending, pending: state.iconPending,
                ringing: state.iconPending, sending: state.iconPending, sent: state.iconPending,
                failed: state.iconError, error: state.iconError, busy: state.iconError,
                'no-answer': state.iconError, undelivered: state.iconError,
                terminated: 'в—Ӣ', empty: 'в—Ӣ'
            };
            return (icons[status] || '') + ' ';
        }

        function statusColor(status) {
            if (!state.colorizeStatus) return 'inherit';
            const colors = {
                completed: state.colorSuccess, delivered: state.colorSuccess, active: state.colorSuccess, inProgress: state.colorSuccess,
                'in-progress': state.colorAccent, queued: state.colorAccent, pending: state.colorAccent, ringing: state.colorAccent,
                sending: state.colorAccent, sent: state.colorAccent,
                failed: state.colorError, error: state.colorError, busy: state.colorError,
                'no-answer': state.colorError, undelivered: state.colorError
            };
            return colors[status] || 'inherit';
        }

            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            currentView = view;
            document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.view-tab[onclick="setView('${view}')"]`).classList.add('active');
            renderPreview();

        function setToggle(btn) {
            const group = btn.dataset.group;
            const parent = btn.parentElement;
            parent.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state[group] = btn.dataset.value;
            updateAll();
        }

            const hex = document.getElementById(`color${name}Hex`).value;
            if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                document.getElementById(`color${name}`).value = hex;
                updateAll();
            }

        function updateCommandList() {
            const category = document.getElementById('commandCategory').value;
            const actionSelect = document.getElementById('commandAction');
            const commands = commandLists[category] || commandLists.welcome;
            actionSelect.innerHTML = commands.map(cmd => `<option value="${cmd.value}">${cmd.label}</option>`).join('');
            state.commandCategory = category;
            state.commandAction = commands[0].value;
        }

            document.getElementById('commandCategory').value = category;

            document.getElementById('commandAction').value = action;

                btn.classList.toggle('active', btn.dataset.value === state.borderStyle);

            document.querySelectorAll('[data-group="outputFormat"]').forEach(btn => {

            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));

        // Helper renderers
        function renderBox(title, rows, borderColor) {
            const box = boxChars[state.borderStyle];
            const hasBox = state.borderStyle !== 'none';
            const bColor = borderColor || state.colorPrimary;

            let html = '<div class="term-box" style="';
            if (hasBox) {
                html += `border: 1px solid ${bColor}`;
            }
            html += '">';

            if (title) {
                html += `<div class="term-box-title" style="color: ${state.colorAccent}; ${hasBox ? `border-bottom: 1px solid ${bColor}` : ''}">${title}</div>`;
            }

            for (const [label, value] of rows) {
                html += `<div>${label}  ${value}</div>`;
            }

            html += '</div>';
            return html;
        }

        function renderTable(title, headers, rows, footer, nextCmd) {
            const colWidths = headers.map((h, i) =>
                Math.max(h.length, ...rows.map(r => {
                    const cell = r[i];
                    const text = typeof cell === 'object' ? cell.value : cell;
                    return String(text).replace(/<[^>]*>/g, '').length;
                })) + 2
            );

            let html = `<div class="term-table">`;
            html += `<div style="color: ${state.colorAccent}; font-weight: bold; margin-bottom: 8px">${title}</div>`;

            // Headers
            html += `<div class="term-table-header" style="color: ${state.colorPrimary}">`;
            headers.forEach((h, i) => {
                html += `<span style="display: inline-block; min-width: ${colWidths[i] * 7}px">${h}</span>`;
            });
            html += `</div>`;

            // Separator
            html += `<div class="term-table-separator" style="color: ${state.colorPrimary}">${'в”Җ'.repeat(colWidths.reduce((a, b) => a + b, 0))}</div>`;

            // Rows
            rows.forEach(row => {
                html += `<div class="term-table-row">`;
                row.forEach((cell, i) => {
                    const text = typeof cell === 'object' ? cell.value : cell;
                    const cellColor = typeof cell === 'object' && cell.color ? cell.color : 'inherit';
                    const dim = typeof cell === 'object' && cell.dim;
                    const displayText = typeof cell === 'string' ? escapeHtml(cell) : text;
                    html += `<span style="display: inline-block; min-width: ${colWidths[i] * 7}px; ${dim ? 'opacity: 0.6;' : ''} color: ${cellColor}">${displayText}</span>`;
                });
                html += `</div>`;
            });

            html += `</div>`;

            if (footer) {
                html += `<div style="margin-top: 10px; opacity: 0.6; font-size: 12px">${footer}</div>`;
            }
            if (nextCmd) {
                html += `<div style="margin-top: 4px">  ${color(state.iconArrow, state.colorAccent)} ${color(nextCmd, state.colorAccent)}</div>`;
            }

            return html;
        }

                ${renderBox('SMS & Messaging', [
                    ['вҖў', 'Send SMS messages'],
                    ['вҖў', 'Track delivery status'],
                    ['вҖў', 'View message history']
                ])}
                ${renderBox('AI Agent Integration (MCP)', [
                    ['вҖў', 'Built-in MCP server'],
                    ['вҖў', '15+ tools for Claude'],
                    ['вҖў', 'Automate workflows']
                ])}
                ${renderBox('Developer Experience', [
                    ['вҖў', 'Secure credential storage'],
                    ['вҖў', 'JSON output for scripting'],
                    ['вҖў', 'Colorized output']
                ])}
            </div>`;
        }

        function renderAllCommands() {
            const categories = [
                { name: 'Auth', cmds: ['login', 'logout', 'status', 'diagnose'] },
                { name: 'Calls', cmds: ['calls:list', 'calls:get', 'calls:make', 'calls:update'] },
                { name: 'SMS', cmds: ['sms:list', 'sms:get', 'sms:send'] },
                { name: 'Numbers', cmds: ['incoming-numbers:list', 'incoming-numbers:buy', 'available-numbers:list'] },
                { name: 'Apps', cmds: ['applications:list', 'applications:create', 'applications:update'] },
                { name: 'Conferences', cmds: ['conferences:list', 'conference-participants:list'] },
                { name: 'Queues', cmds: ['call-queues:list', 'queue-members:list'] },
                { name: 'Recordings', cmds: ['recordings:list', 'recordings:download'] },
                { name: 'Logs', cmds: ['logs:list', 'logs:filter'] },
                { name: 'MCP', cmds: ['mcp:start', 'mcp:config'] }
            ];

            let html = `<div style="padding: 8px">
                <h2 style="color: ${state.colorAccent}; margin-bottom: 16px; font-size: 16px">All Commands (54+)</h2>`;

            for (const cat of categories) {
                html += renderBox(cat.name, cat.cmds.map(c => ['', color('freeclimb ' + c, state.colorSecondary)]));
            }

            html += '</div>';
            return html;
        }

        function updatePrompt() {
            const changes = [];

            // Colors
            if (state.colorPrimary !== DEFAULTS.colorPrimary) changes.push(`primary color: ${state.colorPrimary}`);
            if (state.colorSecondary !== DEFAULTS.colorSecondary) changes.push(`secondary color: ${state.colorSecondary}`);
            if (state.colorAccent !== DEFAULTS.colorAccent) changes.push(`accent color: ${state.colorAccent}`);
            if (state.colorSuccess !== DEFAULTS.colorSuccess) changes.push(`success color: ${state.colorSuccess}`);
            if (state.colorError !== DEFAULTS.colorError) changes.push(`error color: ${state.colorError}`);

            // Banner
            if (state.bannerType !== DEFAULTS.bannerType) {
                const names = { block: 'block letters', slant: 'slant style', simple: 'simple ASCII', none: 'no banner' };
                changes.push(`banner: ${names[state.bannerType]}`);
            }
            if (state.tagline !== DEFAULTS.tagline) changes.push(`tagline: "${state.tagline}"`);
            if (!state.showTagline) changes.push('hide tagline');

            // Tables
            if (state.borderStyle !== DEFAULTS.borderStyle) {
                const names = { rounded: 'rounded', square: 'square', ascii: 'ASCII', none: 'no borders' };
                changes.push(`table borders: ${names[state.borderStyle]}`);
            }
            if (!state.colorizeStatus) changes.push('disable status colors');
            if (!state.showIcons) changes.push('hide status icons');

            // Icons
            if (state.iconSuccess !== DEFAULTS.iconSuccess) changes.push(`success icon: ${state.iconSuccess}`);
            if (state.iconError !== DEFAULTS.iconError) changes.push(`error icon: ${state.iconError}`);
            if (state.iconPending !== DEFAULTS.iconPending) changes.push(`pending icon: ${state.iconPending}`);
            if (state.iconArrow !== DEFAULTS.iconArrow) changes.push(`arrow: ${state.iconArrow}`);

            // Layout
            if (!state.showQuickCommands) changes.push('hide command list');
            if (!state.showTryHint) changes.push('hide try hint');
            if (!state.showDocsLink) changes.push('hide docs link');
            if (state.compactOutput) changes.push('compact output');
            if (!state.showTimestamps) changes.push('hide timestamps');

            const promptEl = document.getElementById('promptText');

            if (changes.length === 0) {
                promptEl.textContent = 'Using default FreeClimb CLI theme. Customize settings to generate a prompt.';
                return;
            }

            let prompt = `Update the FreeClimb CLI theme with:\n\n`;
            prompt += changes.map(c => `вҖў ${c}`).join('\n');
            prompt += `\n\nApply to: src/ui/theme.ts, src/ui/banner.ts, src/ui/chars.ts, src/ui/components.ts, src/ui/format.ts`;

            promptEl.textContent = prompt;
        }

        function copyPrompt() {
            const text = document.getElementById('promptText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Initialize
        updateCommandList();
        updateAll();
    </script>
</body>
</html>
